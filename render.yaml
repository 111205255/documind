# Render Blueprint — import from repo root
services:
  - type: web
    name: documind-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: CHROMA_PERSIST_DIRECTORY
        value: /app/chroma_data
      - key: CORS_ORIGINS
        value: https://documind-beige.vercel.app,https://documind-app-two.vercel.app,http://localhost:3000,http://localhost:8081
      - key: RAG_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
    # Persistent disk requires Starter plan ($7/mo). Uncomment after upgrading:
    # disk:
    #   name: chroma-data
    #   mountPath: /app/chroma_data
    #   sizeGB: 1
