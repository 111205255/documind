# Render Blueprint — import from repo root
services:
  - type: web
    name: documind-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: CHROMA_PERSIST_DIRECTORY
        value: /app/chroma_data
      - key: CORS_ORIGINS
        value: https://documind-beige.vercel.app,https://documind-app-two.vercel.app,http://localhost:3000
