# Duplicate of root render.yaml — use repo-root render.yaml for Blueprint deploy.
# This file documents the same service when browsing backend/ only.
services:
  - type: web
    name: documind-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: CHROMA_PERSIST_DIRECTORY
        value: /app/chroma_data
      - key: CORS_ORIGINS
        value: https://documind-beige.vercel.app,https://documind-app-two.vercel.app,http://localhost:3000,http://localhost:8081
      - key: RAG_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
