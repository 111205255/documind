# Deploy DocuMind API on Render (free tier)
# Dashboard: New → Blueprint → connect this repo, root: backend
services:
  - type: web
    name: documind-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHROMA_PERSIST_DIRECTORY
        value: /app/chroma_data
      - key: CORS_ORIGINS
        value: https://documind-beige.vercel.app,https://documind-app-two.vercel.app,http://localhost:3000
